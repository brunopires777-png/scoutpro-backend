<!DOCTYPE html>
<html class="dark" lang="pt-BR">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>SCOUT PRO | Cyber Analytics</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-green': '#39FF14',
                        'surface': '#131315',
                        'surface-container': '#201f21',
                        'on-surface-variant': '#baccb0',
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'DM Sans', sans-serif; background-color: #0e0e10; color: #e5e1e4; overflow-x: hidden; }
        .bebas { font-family: 'Bebas Neue', cursive; }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(57, 255, 20, 0.1);
            border-radius: 24px;
        }
        .nav-item.active { color: #39FF14; background: rgba(57, 255, 20, 0.05); border-right: 3px solid #39FF14; }
        canvas#bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; opacity: 0.4; }
        .hidden-section { display: none; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <canvas id="bg-canvas"></canvas>

    <aside class="w-20 md:w-64 border-r border-white/5 bg-surface/80 backdrop-blur-xl flex flex-col z-20">
        <div class="p-6 mb-8">
            <h1 class="bebas text-3xl tracking-tighter text-neon-green uppercase">Scout Pro</h1>
        </div>
        
        <nav class="flex-1 px-4 space-y-2">
            <button onclick="showSection('dashboard')" id="nav-dashboard" class="nav-item active w-full flex items-center gap-4 p-4 rounded-xl transition-all hover:bg-white/5">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="hidden md:block font-bold text-xs tracking-widest uppercase">Dashboard</span>
            </button>
            <button onclick="showSection('matches')" id="nav-matches" class="nav-item w-full flex items-center gap-4 p-4 rounded-xl transition-all hover:bg-white/5">
                <span class="material-symbols-outlined">sports_soccer</span>
                <span class="hidden md:block font-bold text-xs tracking-widest uppercase">Partidas</span>
            </button>
            <button onclick="showSection('player')" id="nav-player" class="nav-item w-full flex items-center gap-4 p-4 rounded-xl transition-all hover:bg-white/5">
                <span class="material-symbols-outlined">person_search</span>
                <span class="hidden md:block font-bold text-xs tracking-widest uppercase">Scout</span>
            </button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <header class="sticky top-0 z-30 p-6 bg-surface/50 backdrop-blur-md border-b border-white/5">
            <div class="relative w-full max-w-xl">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
                <input type="text" id="global-search" placeholder="Buscar jogador..." 
                    class="w-full bg-surface-container border-none rounded-2xl py-4 pl-14 pr-6 focus:ring-2 focus:ring-neon-green/30 text-sm"/>
                <div id="search-results" class="absolute w-full mt-2 glass-card hidden z-50 max-h-64 overflow-y-auto bg-[#1a1a1c]"></div>
            </div>
        </header>

        <section id="section-dashboard" class="p-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass-card p-8 col-span-2">
                    <h3 class="text-neon-green bebas text-2xl">Terminal Ativo</h3>
                    <h2 class="text-4xl font-bold">Scout Pro Engine</h2>
                    <p class="text-on-surface-variant mt-4">Sistema pronto para análise de dados BSD v2.</p>
                </div>
            </div>
        </section>

        <section id="section-matches" class="hidden-section p-8 space-y-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="bebas text-3xl">Próximos Jogos</h2>
                <input type="date" id="match-date" class="bg-surface-container border-none rounded-xl text-white px-4 py-2">
            </div>
            <div id="matches-container" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></div>
        </section>

        <section id="section-player" class="hidden-section p-8">
            <div id="player-profile-content">
                <div class="text-center p-20 opacity-30">
                    <span class="material-symbols-outlined text-6xl">person_search</span>
                    <p class="mt-4">Inicie uma busca para ver o perfil.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        function showSection(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden-section'));
            document.getElementById(`section-${id}`).classList.remove('hidden-section');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`nav-${id}`).classList.add('active');
            if(id === 'matches') loadMatches();
        }

        const searchInput = document.getElementById('global-search');
        const resultsBox = document.getElementById('search-results');

        searchInput.addEventListener('input', async (e) => {
            const q = e.target.value;
            if (q.length < 3) { resultsBox.classList.add('hidden'); return; }
            try {
                const res = await fetch(`/api/search?q=${q}&type=player`);
                const data = await res.json();
                resultsBox.innerHTML = '';
                resultsBox.classList.remove('hidden');
                data.forEach(p => {
                    const div = document.createElement('div');
                    div.className = 'p-4 hover:bg-neon-green/10 cursor-pointer border-b border-white/5 flex items-center gap-3';
                    div.innerHTML = `<img src="/img/player/${p.id}" class="w-10 h-10 rounded-full" onerror="this.src='https://via.placeholder.com/40'"><span class="font-bold">${p.common_name || p.name}</span>`;
                    div.onclick = () => loadPlayer(p.id);
                    resultsBox.appendChild(div);
                });
            } catch(err) { console.error(err); }
        });

        async function loadPlayer(id) {
            resultsBox.classList.add('hidden');
            showSection('player');
            const container = document.getElementById('player-profile-content');
            container.innerHTML = '<div class="p-20 text-center animate-pulse">Carregando dados...</div>';
            try {
                const res = await fetch(`/api/player/${id}`);
                const p = await res.json();
                container.innerHTML = `
                    <div class="glass-card p-8 flex flex-col md:flex-row gap-8 items-center">
                        <img src="/img/player/${p.id}" class="w-48 h-48 rounded-3xl border-2 border-neon-green shadow-lg">
                        <div>
                            <h2 class="bebas text-5xl text-neon-green">${p.common_name}</h2>
                            <p class="text-xl opacity-70">${p.team_name || 'Sem Clube'}</p>
                            <div class="grid grid-cols-2 gap-4 mt-6">
                                <div class="bg-white/5 p-4 rounded-xl">
                                    <p class="text-[10px] uppercase opacity-50">Posição</p>
                                    <p class="font-bold text-neon-green">${p.position_name || 'N/A'}</p>
                                </div>
                                <div class="bg-white/5 p-4 rounded-xl">
                                    <p class="text-[10px] uppercase opacity-50">Nacionalidade</p>
                                    <p class="font-bold">${p.nationality_name || 'N/A'}</p>
                                </div>
                            </div>
                        </div>
                    </div>`;
            } catch(e) { container.innerHTML = 'Erro ao carregar perfil.'; }
        }

        async function loadMatches() {
            const container = document.getElementById('matches-container');
            const date = document.getElementById('match-date').value || new Date().toISOString().split('T')[0];
            try {
                const res = await fetch(`/api/matches?date_from=${date}&date_to=${date}`);
                const data = await res.json();
                container.innerHTML = data.length ? '' : '<p class="p-10 opacity-50">Nenhum jogo encontrado.</p>';
                data.forEach(m => {
                    const div = document.createElement('div');
                    div.className = 'glass-card p-6 flex justify-between items-center';
                    div.innerHTML = `
                        <div class="flex-1 flex items-center gap-3"><img src="/img/team/${m.home_team_id}" class="w-8 h-8"><span class="font-bold text-sm">${m.home_team_name}</span></div>
                        <div class="px-4 text-2xl bebas text-neon-green">${m.home_score ?? 0} - ${m.away_score ?? 0}</div>
                        <div class="flex-1 flex items-center gap-3 justify-end"><span class="font-bold text-sm text-right">${m.away_team_name}</span><img src="/img/team/${m.away_team_id}" class="w-8 h-8"></div>
                    `;
                    container.appendChild(div);
                });
            } catch(e) { container.innerHTML = 'Erro ao carregar jogos.'; }
        }

        document.getElementById('match-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('match-date').addEventListener('change', loadMatches);

        // Background Animation Simple
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        function anim() {
            ctx.fillStyle = 'rgba(14, 14, 16, 0.2)'; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#39FF14';
            for(let i=0; i<30; i++) {
                ctx.beginPath();
                ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, 0.5, 0, Math.PI*2);
                ctx.fill();
            }
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
