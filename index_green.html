<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scout Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── VARIÁVEIS BASE (theme-green) ── */
:root{
  --bg:#020805;
  --bg2:rgba(8,18,12,0.85);
  --bg3:rgba(10,25,15,0.7);
  --bg4:rgba(0,0,0,0.5);
  --bg-card:rgba(8,18,12,0.82);
  --bg-glass:rgba(10,25,15,0.45);
  --metal:#0e2016;
  --border:rgba(57,200,100,0.22);
  --border-bright:rgba(57,255,20,0.55);
  --cyan:#39ff14;--cyan2:#00c840;--cyan-dim:rgba(57,255,20,0.15);
  --green:#39ff14;--green-dim:rgba(57,255,20,0.15);
  --gold:#ffd740;--red:#ff1744;--red-dim:rgba(255,23,68,0.15);--orange:#ff9100;
  --text:#d0f5e0;--text2:#7eb090;--text3:#2a4a38;
  --glass-blur:20px;
  --theme-glow:rgba(57,255,20,0.4);
  --shadow-3d:0 20px 50px rgba(0,0,0,0.8),0 0 0 1px rgba(57,255,20,0.05);
}

/* ── TEMAS ── */
.theme-green{--bg:#020805;--bg-card:rgba(8,18,12,0.82);--cyan:#39ff14;--cyan2:#00c840;--cyan-dim:rgba(57,255,20,0.15);--theme-glow:rgba(57,255,20,0.4);--border:rgba(57,200,100,0.22);--border-bright:rgba(57,255,20,0.6);--text:#d0f5e0;--text2:#7eb090;--text3:#2a4a38;}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  background-image:
    linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px),
    radial-gradient(ellipse 80% 60% at 50% 0%,var(--cyan-dim) 0%,transparent 60%);
  background-size:60px 60px,60px 60px,100% 100%;
  color:var(--text);min-height:100vh;overflow-x:hidden;
  transition:background 0.5s ease;
}

.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:1.5rem 1rem 5rem}

/* ── NAV ── */
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;padding-bottom:1rem;border-bottom:1px solid rgba(255,255,255,0.05);gap:12px}
.nav-brand{display:flex;align-items:center;gap:14px;flex:1}
.nav-logo{width:62px;height:62px;border-radius:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;filter:drop-shadow(0 0 20px var(--theme-glow));}
.nav-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:0.1em;color:#fff;text-shadow:0 0 20px var(--theme-glow),0 2px 4px rgba(0,0,0,0.8);line-height:1}
.nav-sub{font-size:11px;color:var(--text2);margin-top:4px;letter-spacing:0.04em;text-transform:uppercase}
.nav-actions{display:flex;align-items:center;gap:10px;flex-shrink:0}


.nav-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.tab{
  padding:9px 18px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
  color:var(--text2);font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.09em;
  border-radius:12px;cursor:pointer;transition:all 0.3s;backdrop-filter:blur(var(--glass-blur));position:relative;
}
.tab:hover{border-color:rgba(255,255,255,0.25);color:var(--cyan);background:var(--cyan-dim)}
.tab.active{background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 22px var(--theme-glow),inset 0 0 10px rgba(255,255,255,0.04);}
.tab .live-dot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--red);display:none;animation:pulse 1s infinite}

.page{display:none}.page.active{display:block}

/* ── STATUS BAR ── */
.status-bar{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,0,0,0.5);border:1px solid var(--border);
  border-radius:14px;padding:11px 16px;margin-bottom:1.25rem;
  font-size:12px;color:var(--text2);flex-wrap:wrap;backdrop-filter:blur(var(--glass-blur));
}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 12px var(--cyan);flex-shrink:0;animation:pulse 2s infinite}
.status-dot.off{background:var(--red);box-shadow:0 0 8px var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.cache-pill{background:var(--cyan-dim);border:1px solid rgba(255,255,255,0.15);color:var(--cyan);padding:3px 10px;border-radius:20px;font-size:11px}
.live-pill{background:var(--red-dim);border:1px solid var(--red);color:var(--red);padding:3px 10px;border-radius:20px;font-size:11px;display:none}

/* ── CARDS glassmorphism + 3D ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:22px;padding:1.35rem;margin-bottom:1.1rem;
  box-shadow:var(--shadow-3d);
  backdrop-filter:blur(var(--glass-blur));
  transition:all 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
  animation:fadeUp 0.5s ease both;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 30px 70px rgba(0,0,0,0.9),0 0 25px var(--cyan-dim);
  border-color:var(--border-bright);
}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:0.07em;color:var(--text);display:flex;align-items:center;gap:8px}
.card-title .material-symbols-outlined{font-size:20px;background:linear-gradient(135deg,var(--cyan),var(--cyan2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 6px var(--theme-glow))}

/* ── FORM ── */
.finput{
  width:100%;
  background:rgba(0,0,0,0.5);
  border:1px solid var(--border);
  color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  padding:12px 15px;border-radius:12px;outline:none;
  transition:all 0.3s;
}
.finput:focus{border-color:var(--cyan);box-shadow:0 0 12px var(--theme-glow),inset 0 0 8px rgba(0,0,0,0.4);}
.finput::placeholder{color:var(--text3)}
select.finput{cursor:pointer}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-row .finput{flex:1}

.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-row .finput{flex:0 0 auto;width:auto;font-size:13px;padding:8px 12px}
.ftab{
  padding:7px 16px;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
  color:var(--text2);font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.06em;
  border-radius:10px;cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.ftab.active{background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan)}
.ftab:hover{border-color:rgba(255,255,255,0.2);color:var(--cyan)}

/* ── BOTÕES ── */
.btn{padding:11px 22px;border:none;border-radius:12px;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.08em;transition:all 0.3s cubic-bezier(0.175,0.885,0.32,1.275);position:relative;overflow:hidden;}
.btn-primary{
  background:linear-gradient(180deg,var(--cyan) 0%,var(--cyan2) 100%);
  color:#000;font-weight:700;
  box-shadow:0 0 25px var(--theme-glow),inset 0 1px 0 rgba(255,255,255,0.4);
}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 0 40px var(--theme-glow);}
.btn-primary:active{transform:translateY(0)}
.btn-sm{padding:7px 15px;font-size:13px}
.btn-ghost{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:var(--text2)}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}
.btn-danger{background:var(--red-dim);border:1px solid var(--red);color:var(--red)}
.btn:disabled{opacity:0.4;cursor:not-allowed}

/* ── SETTINGS MODAL ── */


/* ── FORM extras ── */
.finput::placeholder{color:var(--text3)}
select.finput{cursor:pointer}
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-row .finput{flex:1}
.filter-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-row .finput{flex:0 0 auto;width:auto;font-size:13px;padding:8px 12px}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:20px 14px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(15px)}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:linear-gradient(165deg,var(--bg),#000);border:1px solid var(--border-bright);border-radius:24px;width:100%;max-width:680px;overflow:hidden;transform:scale(0.93) translateY(18px);transition:all .35s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 30px 100px rgba(0,0,0,1)}
.overlay.open .modal{transform:scale(1) translateY(0)}
.modal-hdr{background:rgba(0,0,0,0.4);padding:16px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.06)}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:0.04em;color:#fff}
.modal-close{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;line-height:1;padding:0}
.modal-close:hover{color:var(--cyan)}
.modal-tabs{display:flex;border-bottom:1px solid rgba(60,60,60,0.5);overflow-x:auto;scrollbar-width:none}
.modal-tabs::-webkit-scrollbar{display:none}
.mtab{background:none;border:none;color:#888;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:0.06em;padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.mtab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.modal-body{padding:18px}

/* ── TOAST / SPINNER / MISC ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--cyan);color:#000;font-weight:700;font-size:13px;padding:11px 24px;border-radius:100px;opacity:0;transition:all 0.35s;pointer-events:none;z-index:9999;white-space:nowrap;box-shadow:0 0 30px var(--theme-glow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{text-align:center;padding:2.5rem 1rem;color:var(--text2)}
.spinner-wrap{position:relative;width:72px;height:72px;margin:0 auto 1rem}
.spinner{width:72px;height:72px;border:3px solid var(--cyan-dim);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite;position:absolute;top:0;left:0}
.spinner-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--cyan);letter-spacing:0.05em;line-height:1}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.fadein{animation:fadeUp 0.35s ease both}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--text3)}
.empty-icon{font-size:38px;margin-bottom:10px;opacity:0.3}
.err{background:var(--red-dim);border:1px solid rgba(255,23,68,0.3);color:#ff8a80;border-radius:14px;padding:1rem 1.2rem;font-size:13px;line-height:1.6;margin-top:8px}

/* ── TEAM LIST ── */
.team-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.team-item{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:14px;padding:11px 14px;cursor:pointer;transition:all 0.25s}
.team-item:hover{border-color:var(--border-bright);background:var(--cyan-dim);box-shadow:0 0 16px var(--theme-glow)}
.team-left{display:flex;align-items:center;gap:10px}
.team-badge{width:38px;height:38px;background:var(--cyan-dim);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--cyan);flex-shrink:0;overflow:hidden}
.team-badge img{width:100%;height:100%;object-fit:contain;padding:4px}
.team-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.04em}
.team-info{font-size:11px;color:var(--text2);margin-top:1px}

/* ── PLAYER GRID ── */
.pos-group{margin-bottom:14px}
.pos-label{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.player-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.player-card{background:rgba(16,16,16,0.92);border:1px solid var(--border);border-radius:12px;padding:11px 12px;cursor:pointer;transition:all 0.2s;text-align:center}
.player-card:hover{border-color:var(--border-bright);transform:translateY(-3px);box-shadow:0 8px 20px var(--theme-glow)}
.pc-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.03em;margin-bottom:2px}
.pc-pos{font-size:12px;color:var(--text2);font-weight:600;margin-top:2px}

/* ── PLAYER HEADER ── */
.p-hdr{display:flex;align-items:center;gap:14px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.p-avatar{width:60px;height:60px;background:var(--cyan-dim);border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--cyan);flex-shrink:0;overflow:hidden;box-shadow:0 0 16px var(--theme-glow)}
.p-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.p-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.04em;line-height:1}
.p-info{font-size:13px;color:var(--text2);margin-top:3px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:12px;margin-top:6px}
table{width:100%;border-collapse:collapse;min-width:480px}
thead tr{background:rgba(0,0,0,0.6)}
th{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text);padding:10px 12px;text-align:center;white-space:nowrap;border-bottom:1px solid var(--border)}
th:first-child{text-align:left;color:var(--text2);min-width:110px}
tbody tr{border-top:1px solid rgba(40,40,40,0.6);transition:background 0.15s}
tbody tr:hover{background:rgba(255,255,255,0.03)}
td{padding:11px 12px;text-align:center;color:#d0d0d0;font-size:13px}
td:first-child{text-align:left;font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.03em}
td.num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:#fff}
td.nd{color:#555;font-size:13px}
.score-w{color:#39ff14;font-family:'Bebas Neue',sans-serif;font-size:20px;font-weight:700}
.score-l{color:var(--red);font-family:'Bebas Neue',sans-serif;font-size:20px;font-weight:700}
.score-d{color:#b0b0b0;font-family:'Bebas Neue',sans-serif;font-size:20px;font-weight:700}
.avg-row{background:rgba(0,0,0,0.5)!important;border-top:1px solid var(--border)!important}
.avg-row td{color:var(--cyan)!important;font-family:'Bebas Neue',sans-serif;font-size:18px}
.avg-row td:first-child{font-size:11px;letter-spacing:0.1em;color:var(--cyan)!important}

/* ── VERDICT ── */
.verdict-wrap{text-align:center;padding:1.5rem 1rem}
.v-label{font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--text2);margin-bottom:8px}
.v-pct{font-family:'Bebas Neue',sans-serif;font-size:84px;line-height:1}
.v-pct.high{color:var(--cyan);text-shadow:0 0 40px var(--theme-glow)}
.v-pct.mid{color:var(--gold);text-shadow:0 0 40px rgba(255,215,64,0.5)}
.v-pct.low{color:var(--red);text-shadow:0 0 40px rgba(255,23,68,0.5)}
.v-desc{font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6;max-width:460px;margin-left:auto;margin-right:auto}
.v-legend{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);font-size:11px;color:var(--text2)}
.v-leg{display:flex;align-items:center;gap:4px}
.v-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);flex-shrink:0}

/* ── HISTÓRICO ── */
.hist-item{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin-bottom:8px}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px}
.hist-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:0.04em}
.hist-sub{font-size:11px;color:var(--text2);margin-top:1px}
.hist-right{text-align:right;flex-shrink:0}
.hist-date{font-size:10px;color:var(--text3)}
.hist-pct{font-family:'Bebas Neue',sans-serif;font-size:22px;margin-top:2px}
.hist-stats{display:flex;gap:6px;flex-wrap:wrap}
.hstat{font-size:12px;background:rgba(0,0,0,0.35);padding:4px 10px;border-radius:6px;color:#ccc;border:1px solid var(--border)}
.hstat b{color:var(--cyan)}

/* ── MATCH CARD ── */
.match-list{display:flex;flex-direction:column;gap:8px}
.match-card{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:20px;padding:16px 14px 12px;cursor:pointer;
  transition:all 0.3s;position:relative;overflow:hidden;
  backdrop-filter:blur(10px);
}
.match-card:hover{border-color:var(--border-bright);box-shadow:0 8px 30px var(--theme-glow);transform:translateY(-2px)}
.match-card.live{border-color:rgba(255,23,68,0.4);box-shadow:0 0 20px rgba(255,23,68,0.1)}
.match-card.live::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.match-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.match-liga{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)}
.match-hora{font-size:12px;color:var(--text2);font-weight:600}
.match-hora.live{color:var(--red);font-weight:700;display:flex;align-items:center;gap:5px;font-size:13px}
.match-hora.live::before{content:'';width:6px;height:6px;background:var(--red);border-radius:50%;display:inline-block;animation:pulse 1s infinite;flex-shrink:0}
/* Layout central: escudo grande + nome embaixo */
.match-teams{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:12px}
.match-side{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
.match-logo{width:44px;height:44px;object-fit:contain;flex-shrink:0}
.match-team{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.03em;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px;width:100%}
.match-center{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;min-width:64px}
.match-score{font-family:'Bebas Neue',sans-serif;font-size:32px;font-weight:700;line-height:1;letter-spacing:0.04em}
.match-vs{font-size:13px;color:var(--text3);font-family:'Bebas Neue',sans-serif;letter-spacing:0.1em}
.match-status-badge{font-size:9px;font-weight:700;letter-spacing:0.08em;padding:2px 7px;border-radius:6px;text-transform:uppercase}
.match-countdown{font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--text3);letter-spacing:0.05em;text-align:center}
.match-pills{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.pill{font-size:10px;font-weight:600;padding:3px 9px;border-radius:8px;background:rgba(0,0,0,0.35);color:var(--text2);border:1px solid var(--border)}
.pill.c{background:var(--cyan-dim);color:var(--cyan);border-color:var(--border-bright)}
.pill.g{background:var(--cyan-dim);color:var(--cyan);border-color:var(--border-bright)}
.pill.r{background:var(--red-dim);color:var(--red);border-color:rgba(255,23,68,0.25)}

.oc .ol{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:5px}

.odds-sec{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.os{background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:9px;padding:9px;text-align:center}
.os .ol{font-size:9px;color:var(--text3);margin-bottom:3px}
.os .ov{font-size:16px;font-weight:700;color:var(--text)}
.lu-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}

.lu-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:0.04em;margin-bottom:8px;color:var(--cyan);display:flex;justify-content:space-between}

.lu-pos{font-size:9px;font-weight:700;padding:2px 4px;border-radius:3px;text-transform:uppercase}
.pos-G{background:rgba(255,215,64,0.15);color:var(--gold)}
.pos-D{background:var(--cyan-dim);color:var(--cyan)}
.pos-M{background:var(--cyan-dim);color:var(--cyan)}

.ps-list{display:flex;flex-direction:column;gap:6px}

.ps-stat{background:rgba(0,0,0,0.3);border-radius:6px;padding:4px 6px;text-align:center;min-width:34px}
.ps-stat .n{font-family:'Bebas Neue',sans-serif;font-size:15px;line-height:1}
.ps-stat .l{font-size:8px;color:var(--text3)}
.ps-rating{font-family:'Bebas Neue',sans-serif;font-size:20px;min-width:42px;text-align:center;border-radius:8px;padding:4px 6px}
.inc-list{display:flex;flex-direction:column;gap:4px}
.inc{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.4);border-radius:9px;padding:7px 10px}
.inc-min{font-size:10px;font-weight:700;color:var(--text3);min-width:28px}
.inc-ico{font-size:14px}
.inc-txt{font-size:12px;flex:1}
.inc-side{font-size:10px;color:var(--text3)}
.vb-list{display:flex;flex-direction:column;gap:8px}
.vb-card{background:rgba(0,0,0,0.5);border:1px solid var(--border-bright);border-radius:16px;padding:12px 14px;display:flex;align-items:center;gap:12px;border-left:3px solid var(--cyan)}
.vb-conf{background:var(--cyan-dim);border:1px solid var(--border-bright);color:var(--cyan);font-family:'Bebas Neue',sans-serif;font-size:20px;min-width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vb-info{flex:1;min-width:0}
.vb-match{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:0.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vb-meta{font-size:11px;color:var(--text2);margin-top:2px}

.vb-odd{font-family:'Bebas Neue',sans-serif;font-size:24px;color:var(--gold);line-height:1}

.std-table{width:100%;border-collapse:collapse}

.std-table td{padding:8px 10px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;transition:background .15s}
.std-table tr:hover td{background:var(--cyan-dim)}
.std-table .pos-num{font-weight:700;color:var(--text3);width:24px}
.std-table .team-cell{display:flex;align-items:center;gap:7px}
.std-table .team-cell img{width:18px;height:18px;object-fit:contain}
.std-table .team-cell span{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.03em}
.std-table .pts{font-family:'Bebas Neue',sans-serif;font-size:17px;font-weight:700;color:#fff}
.forma{display:flex;gap:3px;justify-content:center}
.fW{background:var(--cyan);color:#000;width:15px;height:15px;border-radius:3px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
.fD{background:rgba(255,255,255,0.2);color:#fff;width:15px;height:15px;border-radius:3px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}
.fL{background:var(--red);color:#fff;width:15px;height:15px;border-radius:3px;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* ── DEST MODAL (bottom sheet jogador) ── */
.dest-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.25s}
.dest-modal-overlay.open{opacity:1;pointer-events:all}
.dest-modal{background:linear-gradient(160deg,var(--bg-card),rgba(0,0,0,0.99));border:1px solid var(--border-bright);border-radius:24px 24px 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:540px;max-height:85vh;overflow-y:auto;transform:translateY(40px);transition:transform 0.3s ease;box-shadow:0 -8px 40px rgba(0,0,0,0.7),inset 0 1px 0 rgba(255,255,255,0.06)}
.dest-modal-overlay.open .dest-modal{transform:translateY(0)}
.dest-modal-drag{width:40px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:0 auto 1.25rem;cursor:pointer}
.dest-modal-hdr{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.dest-modal-photo{width:54px;height:54px;border-radius:50%;border:2px solid var(--border);background:var(--cyan-dim);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0}
.dest-modal-photo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.dest-modal-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em;line-height:1}
.dest-modal-sub{font-size:11px;color:var(--text2);margin-top:3px}
.dm-score-big{font-family:'Bebas Neue',sans-serif;font-size:38px;margin-left:auto;border-radius:12px;padding:6px 14px;line-height:1}
.dm-stat-grid{display:flex;flex-direction:column;gap:10px}
.dm-stat{display:flex;align-items:center;gap:10px}
.dm-stat-lbl{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);min-width:140px}
.dm-bar-wrap{flex:1;height:5px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.dm-bar{height:5px;border-radius:3px;transition:width 0.5s ease}
.dm-stat-val{font-family:'Bebas Neue',sans-serif;font-size:16px;min-width:40px;text-align:right}

/* ── DESTAQUES ── */
.dest-card{background:var(--bg-card);border:1px solid var(--border);border-radius:22px;padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow-3d);backdrop-filter:blur(var(--glass-blur))}
.dest-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.dest-item{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:12px;padding:9px 12px;cursor:pointer;transition:all .2s}
.dest-item:hover{border-color:var(--border-bright);background:var(--cyan-dim)}
.dest-rank{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text3);min-width:22px;text-align:center}
.dest-rank.g1{color:var(--gold)}.dest-rank.g2{color:#c0c0c0}.dest-rank.g3{color:#cd7f32}
.dest-photo{width:38px;height:38px;border-radius:50%;object-fit:cover;background:var(--cyan-dim);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;overflow:hidden}
.dest-photo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.dest-info{flex:1;min-width:0}
.dest-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dest-sub{font-size:10px;color:var(--text2);margin-top:1px}
.dest-score{font-family:'Bebas Neue',sans-serif;font-size:26px;border-radius:10px;padding:4px 10px;text-align:center;min-width:52px}
.dest-score.high{color:var(--green);background:var(--cyan-dim);border:1px solid var(--border-bright)}
.dest-score.mid{color:var(--gold);background:rgba(255,215,64,0.1);border:1px solid rgba(255,215,64,0.2)}
.dest-score.low{color:var(--red);background:var(--red-dim);border:1px solid rgba(255,23,68,0.2)}
.slabel{font-size:10px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--text3);margin-bottom:8px}

/* ── LEAGUE PICKER ── */
.lp-trigger{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.4);border:1px solid var(--border);border-radius:12px;padding:10px 14px;cursor:pointer;transition:all .2s;font-size:13px;color:var(--text2);width:100%;text-align:left}
.lp-trigger:hover{border-color:var(--border-bright);color:var(--cyan)}
.lp-trigger-ico{font-size:18px;flex-shrink:0}
.lp-trigger-text{flex:1;font-weight:500}
.lp-trigger-arrow{color:var(--text3);font-size:16px;transition:transform .2s}
.lp-trigger.open .lp-trigger-arrow{transform:rotate(180deg)}
.lp-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:400;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(8px)}
.lp-overlay.open{opacity:1;pointer-events:all}
.lp-sheet{position:absolute;bottom:0;left:0;right:0;background:rgba(8,15,10,0.98);backdrop-filter:blur(20px);border-radius:20px 20px 0 0;border-top:1px solid var(--border);max-height:80vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s ease}
.lp-overlay.open .lp-sheet{transform:translateY(0)}
.lp-handle{width:40px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:12px auto 0;cursor:pointer;flex-shrink:0}
.lp-search{padding:14px 16px 10px;flex-shrink:0}
.lp-search input{width:100%;background:rgba(22,22,22,0.95);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-size:14px;outline:none;font-family:'DM Sans',sans-serif}
.lp-search input:focus{border-color:var(--cyan)}
.lp-list{overflow-y:auto;padding:0 16px 24px;flex:1}
.lp-item{display:flex;align-items:center;gap:12px;padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;transition:background .15s;border-radius:8px}
.lp-item:hover{background:rgba(255,255,255,0.04)}
.lp-item.selected{background:var(--cyan-dim);border-color:var(--border-bright)}
.lp-item-logo{width:36px;height:36px;object-fit:contain;flex-shrink:0;border-radius:4px}
.lp-item-logo-placeholder{width:36px;height:36px;background:rgba(35,35,35,0.9);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.lp-item-info{flex:1;min-width:0}
.lp-item-name{font-size:14px;font-weight:600;color:var(--text)}
.lp-item-country{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-top:1px}
.lp-item-check{color:var(--cyan);font-size:16px;opacity:0}
.lp-item.selected .lp-item-check{opacity:1}
.lp-section-hdr{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:14px 0 6px}

/* ── BUSCA DE JOGADOR ── */
.player-search-card{background:var(--bg-card);border:1px solid var(--border);border-radius:22px;padding:1.35rem;margin-bottom:1.1rem;box-shadow:var(--shadow-3d);backdrop-filter:blur(var(--glass-blur));transition:all 0.35s;animation:fadeUp 0.5s ease both}
.player-results{display:flex;flex-direction:column;gap:6px;margin-top:10px}
.player-result-item{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:12px;padding:10px 12px;cursor:pointer;transition:all .2s}
.player-result-item:hover{border-color:var(--border-bright);background:var(--cyan-dim)}
.pr-photo{width:40px;height:40px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--cyan-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px}
.pr-photo img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.pr-info{flex:1;min-width:0}
.pr-name{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-sub{font-size:11px;color:var(--text2);margin-top:1px}
.pr-pos{font-size:10px;font-weight:700;color:var(--cyan);background:var(--cyan-dim);border:1px solid var(--border-bright);border-radius:4px;padding:1px 7px;flex-shrink:0}
